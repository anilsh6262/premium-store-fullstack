<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    name="description"
    content="Product Store - Premium Handmade Gifts & Custom Products"
  />

  <meta
    name="keywords"
    content="gift store, handmade gifts, custom gifts, product store"
  />

  <meta
    name="author"
    content="Product Store"
  />

  <link
    rel="icon"
    href="/favicon.ico"
  />

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <title>Product Store | Handmade & Personalized Gifts</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f8fafc;
      overflow-x:hidden;
    }

    #loader{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:white;
      z-index:9999;
    }

    .spinner{
      width:55px;
      height:55px;
      border:5px solid #e2e8f0;
      border-top:5px solid #2563eb;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div id="loader">
    <div class="spinner"></div>
  </div>

  <div id="root"></div>

  <script>
    window.addEventListener("load", () => {
      const loader = document.getElementById("loader");

      setTimeout(() => {
        if(loader){
          loader.style.display = "none";
        }
      }, 500);
    });
  </script>

  <script
    type="module"
    src="/src/main.jsx"
  ></script>

</body>
</html>
